<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuestas - Menu</title>
    <link rel="stylesheet" href="/apuesta.css">
    <script type="module" src="/CommandDispatcher.js"></script>
</head>
<body class="app-shell">
    <script src="/utilesVista.js"></script>

    <aside class="sidebar">
        <label id="nombreCompleto"></label>
        <button type="button" onclick="cargarContenido('jugador/tablero-jugador.html')">Tablero</button>
        <button type="button" onclick="cargarContenido('jugador/confirmar-apuesta.html')">Confirmar apuesta</button>
        <button type="button" onclick="logout()">Salir</button>
    </aside>

    <main class="content">
        <iframe id="contenidoFrame" src="jugador/tablero-jugador.html" frameborder="0"></iframe>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const spnNombreCompleto = document.getElementById('nombreCompleto');

            const vistaMenu = CommandDispatcher.registerView('MenuApuestas', {
                onException: async (msg) => await mostrarMensaje(msg)
            });

            vistaMenu.handler('usuarioNoAutenticado', (urlDestino) => window.location.href = '/' + urlDestino);
            vistaMenu.handler('nombreCompleto', (nombreCompleto) => {
                spnNombreCompleto.innerHTML = 'APUESTAS DE ' + nombreCompleto.toUpperCase();
            });

            CommandDispatcher.startView(vistaMenu);
            CommandDispatcher.submit('/menu/vistaConectada', {}, 'GET');
        });

        function cargarContenido(pagina) {
            document.getElementById('contenidoFrame').src = pagina;
        }

        function logout() {
            CommandDispatcher.submit('/login-jugador/logout', {});
        }
    </script>
</body>
</html>
